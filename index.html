<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VMAX Show Tracker</title>
<style>
  :root{
    --bg:#0e1217; --panel:#161c24; --panel2:#1d2530; --line:#2a3441;
    --ink:#eef2f6; --mute:#8a97a6; --faint:#5c6775;
    --bolt:#ffd23f; --got:#34d399; --got-bg:#0f2e23; --accent:#5ea9ff; --tap:#222c38;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  body{padding-bottom:96px;}
  @media (prefers-reduced-motion:no-preference){ .row{transition:background .15s,border-color .15s;} }

  header{position:sticky; top:0; z-index:20; background:var(--bg);
    border-bottom:1px solid var(--line); padding:10px 12px 8px;}
  .title{display:flex; align-items:baseline; gap:8px; margin:0 0 8px;}
  .title h1{font-size:17px; font-weight:800; letter-spacing:.2px; margin:0;}
  .title .vbolt{color:var(--bolt); font-weight:900;}
  .title .count{margin-left:auto; font-size:12px; color:var(--mute); font-variant-numeric:tabular-nums;}

  .toolbar{display:flex; gap:8px; align-items:center;}
  .search{flex:1; font-size:16px; padding:11px 12px; border-radius:11px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink); outline:none;}
  .search:focus{border-color:var(--accent);}
  .viewtoggle{flex:0 0 auto; font-size:13px; font-weight:600; padding:11px 13px; border-radius:11px;
    border:1px solid var(--line); background:var(--panel); color:var(--mute);}
  .viewtoggle.on{color:var(--bolt); border-color:var(--bolt);}

  .filters{display:flex; gap:6px; overflow-x:auto; padding:8px 0 2px; scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; font-size:13px; padding:6px 12px; border-radius:999px;
    border:1px solid var(--line); background:var(--panel); color:var(--mute); white-space:nowrap;}
  .chip.on{background:var(--bolt); color:#1a1407; border-color:var(--bolt); font-weight:700;}

  .setgroup{margin-top:14px;}
  .sethead{display:flex; align-items:center; gap:8px; padding:0 12px 6px;}
  .sethead h2{font-size:13px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
    color:var(--accent); margin:0;}
  .sethead .frac{font-size:12px; color:var(--faint); font-variant-numeric:tabular-nums; margin-left:auto;}

  .row{display:flex; align-items:center; gap:10px; padding:10px 12px;
    margin:0 8px 6px; border-radius:12px; background:var(--panel);
    border:1px solid var(--line); cursor:pointer;}
  .row.got{background:var(--got-bg); border-color:#1c5443;}
  .tick{flex:0 0 auto; width:24px; height:24px; border-radius:7px;
    border:2px solid var(--faint); display:grid; place-items:center; font-size:14px; color:transparent;}
  .row.got .tick{background:var(--got); border-color:var(--got); color:#06281d;}
  .thumb{flex:0 0 auto; width:46px; height:64px; border-radius:6px; background:#0b0f14;
    object-fit:contain; border:1px solid var(--line);}
  .thumb.ph{display:grid; place-items:center; font-size:9px; color:var(--faint); text-align:center; line-height:1.1; padding:2px;}
  .info{flex:1 1 auto; min-width:0;}
  .name{font-size:15px; font-weight:600; line-height:1.2;}
  .num{font-size:12px; color:var(--mute); margin-top:2px; font-variant-numeric:tabular-nums;}
  .row.got .num{color:#5fae93;}
  .price{flex:0 0 auto; font-size:14px; font-weight:700; color:var(--got);
    font-variant-numeric:tabular-nums; min-width:54px; text-align:right;}
  .price.empty{color:var(--faint); font-weight:500;}

  #list.grid .setgroup>div{display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
    gap:8px; padding:0 8px;}
  #list.grid .row{flex-direction:column; align-items:stretch; gap:6px; padding:8px; margin:0; position:relative;}
  #list.grid .tick{position:absolute; top:12px; right:12px; z-index:2; width:22px; height:22px;
    background:rgba(0,0,0,.55); border-color:#fff;}
  #list.grid .row.got .tick{background:var(--got); border-color:var(--got);}
  #list.grid .thumb{width:100%; height:auto; aspect-ratio:.717;}
  #list.grid .info{text-align:center;}
  #list.grid .name{font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #list.grid .num{font-size:10px;}
  #list.grid .price{min-width:0; text-align:center; font-size:13px;}

  .empty-state{text-align:center; color:var(--faint); padding:48px 24px; font-size:14px;}

  .bar{position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--panel2);
    border-top:1px solid var(--line); padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex; align-items:center; gap:12px;}
  .stat{display:flex; flex-direction:column; line-height:1.1;}
  .stat .big{font-size:19px; font-weight:800; font-variant-numeric:tabular-nums;}
  .stat .lbl{font-size:11px; color:var(--mute); text-transform:uppercase; letter-spacing:.5px;}
  .stat .big.spend{color:var(--bolt);}
  .bar .btn{font-size:14px; font-weight:700; padding:11px 14px; border-radius:11px;
    border:none; background:var(--accent); color:#05203f;}
  .bar .btn.first{margin-left:auto;}
  .btn.ghost{background:var(--tap); color:var(--ink);}

  .sheet-bg{position:fixed; inset:0; z-index:40; background:rgba(0,0,0,.6); display:none; align-items:flex-end;}
  .sheet-bg.open{display:flex;}
  .sheet{width:100%; background:var(--panel2); border-radius:18px 18px 0 0;
    padding:16px 16px calc(16px + env(safe-area-inset-bottom)); border-top:1px solid var(--line);
    max-height:92vh; overflow-y:auto;}
  .sheet-img{display:block; width:170px; max-width:48%; margin:2px auto 12px; border-radius:10px;
    background:#0b0f14; box-shadow:0 4px 20px rgba(0,0,0,.4);}
  .sheet-img.ph{height:220px; display:grid; place-items:center; color:var(--faint); font-size:12px;}
  .sheet h3{margin:0 0 2px; font-size:16px; font-weight:700; text-align:center;}
  .sheet .sub{font-size:12px; color:var(--mute); margin-bottom:14px; font-variant-numeric:tabular-nums; text-align:center;}
  .pricewrap{display:flex; align-items:center; gap:8px; background:var(--bg);
    border:1px solid var(--line); border-radius:12px; padding:0 14px; margin-bottom:14px;}
  .pricewrap .dollar{font-size:22px; color:var(--mute); font-weight:700;}
  .pricewrap input{flex:1; font-size:24px; font-weight:700; padding:14px 0; border:none;
    background:transparent; color:var(--ink); outline:none; font-variant-numeric:tabular-nums;}
  .quick{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .quick button{flex:1; min-width:60px; font-size:14px; font-weight:600; padding:10px 0;
    border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--ink);}
  .sheet-actions{display:flex; gap:10px;}
  .sheet-actions button{flex:1; font-size:15px; font-weight:700; padding:14px 0; border-radius:12px; border:none;}
  .save{background:var(--got); color:#06281d;}
  .remove{background:var(--tap); color:#ff8585;}
  .cancel{background:var(--tap); color:var(--ink); flex:0 0 auto; padding:14px 18px;}

  .zoom-bg{position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.92);
    display:none; align-items:center; justify-content:center; padding:24px;}
  .zoom-bg.open{display:flex;}
  .zoom-bg img{max-width:100%; max-height:100%; border-radius:12px;}
</style>
</head>
<body>
<header>
  <div class="title">
    <h1><span class="vbolt">V</span>MAX Show Tracker</h1>
    <span class="count" id="hcount"></span>
  </div>
  <div class="toolbar">
    <input class="search" id="search" type="search" placeholder="Search name, set, or number…" autocomplete="off">
    <button class="viewtoggle" id="viewToggle">Grid</button>
  </div>
  <div class="filters" id="filters"></div>
</header>

<main id="list"></main>

<div class="bar">
  <div class="stat"><span class="big" id="sGot">0</span><span class="lbl">Bought</span></div>
  <div class="stat"><span class="big spend" id="sSpend">$0</span><span class="lbl">Spent</span></div>
  <button class="btn ghost first" id="resetBtn">Reset</button>
  <button class="btn" id="exportBtn">Export CSV</button>
</div>

<div class="sheet-bg" id="sheetBg">
  <div class="sheet">
    <img class="sheet-img" id="shImg" alt="">
    <h3 id="shName">Card</h3>
    <div class="sub" id="shSub"></div>
    <div class="pricewrap"><span class="dollar">$</span>
      <input id="shPrice" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00"></div>
    <div class="quick" id="quickRow"></div>
    <div class="sheet-actions">
      <button class="cancel" id="shCancel">Cancel</button>
      <button class="remove" id="shRemove">Not bought</button>
      <button class="save" id="shSave">Mark bought</button>
    </div>
  </div>
</div>

<div class="zoom-bg" id="zoomBg"><img id="zoomImg" alt=""></div>

const slug = s => s.replace(/[^a-z0-9]+/gi,'_');
CARDS.forEach(c => c.push(slug(c[0]) + '|' + slug(c[1])));   // c[4] = id

const SETS = [];
CARDS.forEach(c => { if(!SETS.includes(c[0])) SETS.push(c[0]); });

// ---- persistence: localStorage works on a normal hosted page (GitHub Pages) ----
const KEY='vmax_tracker_v1', VIEWKEY='vmax_tracker_view';
let state={}, activeSet='ALL', query='', gridView=false;

function load(){
  try{ const r=localStorage.getItem(KEY); if(r) state=JSON.parse(r); }catch(e){ state={}; }
  try{ if(localStorage.getItem(VIEWKEY)==='grid') gridView=true; }catch(e){}
  render();
}
function persist(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function persistView(){ try{ localStorage.setItem(VIEWKEY, gridView?'grid':'list'); }catch(e){} }

const money=n=>'$'+(Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:n%1?2:0,maximumFractionDigits:2});
function totals(){ let g=0,s=0; for(const id in state){g++; s+=(+state[id].price||0);} return {got:g,spend:s}; }
function setCounts(s){ const cs=CARDS.filter(c=>c[0]===s); return {got:cs.filter(c=>state[c[4]]).length,total:cs.length}; }

function buildFilters(){
  const wrap=document.getElementById('filters'); wrap.innerHTML='';
  const mk=(id,label)=>{ const b=document.createElement('button');
    b.className='chip'+(activeSet===id?' on':''); b.textContent=label;
    b.onclick=()=>{activeSet=id; render();}; return b; };
  wrap.appendChild(mk('ALL','All')); wrap.appendChild(mk('TODO','Still needed'));
  SETS.forEach(s=>wrap.appendChild(mk(s,s)));
}

function thumbEl(c){
  const img=document.createElement('img');
  img.className='thumb'; img.loading='lazy'; img.alt=c[2]; img.src=c[3];
  img.onerror=function(){ const ph=document.createElement('div'); ph.className='thumb ph'; ph.textContent=c[1]; img.replaceWith(ph); };
  return img;
}

function render(){
  buildFilters();
  const list=document.getElementById('list');
  list.className=gridView?'grid':'';
  const vt=document.getElementById('viewToggle');
  vt.classList.toggle('on',gridView); vt.textContent=gridView?'List':'Grid';
  list.innerHTML='';
  const q=query.trim().toLowerCase();
  let shown=CARDS.filter(c=>{
    if(activeSet==='TODO'){ if(state[c[4]]) return false; }
    else if(activeSet!=='ALL'){ if(c[0]!==activeSet) return false; }
    if(q){ if(!(c[2]+' '+c[0]+' '+c[1]).toLowerCase().includes(q)) return false; }
    return true;
  });
  if(shown.length===0){
    list.innerHTML='<div class="empty-state">No cards match. Clear the search or pick another filter.</div>';
  } else {
    let curSet=null, group=null;
    shown.forEach(c=>{
      if(c[0]!==curSet){
        curSet=c[0]; const sc=setCounts(curSet);
        const sg=document.createElement('div'); sg.className='setgroup';
        sg.innerHTML='<div class="sethead"><h2>'+curSet+'</h2><span class="frac">'+sc.got+' / '+sc.total+'</span></div>';
        group=document.createElement('div'); sg.appendChild(group); list.appendChild(sg);
      }
      const got=!!state[c[4]];
      const row=document.createElement('div'); row.className='row'+(got?' got':'');
      const tick=document.createElement('div'); tick.className='tick'; tick.textContent='✓';
      const thumb=thumbEl(c);
      const info=document.createElement('div'); info.className='info';
      info.innerHTML='<div class="name">'+c[2]+'</div><div class="num">'+c[1]+'</div>';
      const price=document.createElement('div'); price.className='price'+(got?'':' empty');
      price.textContent=got?money(+state[c[4]].price||0):'–';
      row.append(tick,thumb,info,price);
      row.onclick=()=>openSheet(c);
      group.appendChild(row);
    });
  }
  const t=totals();
  document.getElementById('sGot').textContent=t.got;
  document.getElementById('sSpend').textContent=money(t.spend);
  document.getElementById('hcount').textContent=t.got+' of '+CARDS.length+' collected';
}

let sheetCard=null;
const sheetBg=document.getElementById('sheetBg');
const priceInput=document.getElementById('shPrice');
const shImg=document.getElementById('shImg');

function openSheet(c){
  sheetCard=c;
  document.getElementById('shName').textContent=c[2];
  document.getElementById('shSub').textContent=c[0]+' · '+c[1];
  shImg.style.display=''; shImg.src=c[3]; shImg.alt=c[2];
  shImg.onerror=function(){ shImg.style.display='none'; };
  shImg.onclick=()=>{ document.getElementById('zoomImg').src=c[3]; document.getElementById('zoomBg').classList.add('open'); };
  const ex=state[c[4]];
  priceInput.value=ex?(ex.price||''):'';
  document.getElementById('shRemove').style.display=ex?'':'none';
  sheetBg.classList.add('open');
  setTimeout(()=>priceInput.focus(),120);
}
function closeSheet(){ sheetBg.classList.remove('open'); sheetCard=null; }

[1,5,10,20,50,100].forEach(v=>{ const b=document.createElement('button'); b.textContent='$'+v;
  b.onclick=()=>{ priceInput.value=((+priceInput.value||0)+v).toFixed(2).replace(/\.00$/,''); };
  document.getElementById('quickRow').appendChild(b); });

function saveSheet(){ if(!sheetCard) return; const p=parseFloat(priceInput.value);
  state[sheetCard[4]]={price:isNaN(p)?0:p,t:Date.now()}; persist(); render(); closeSheet(); }
function removeSheet(){ if(!sheetCard) return; delete state[sheetCard[4]]; persist(); render(); closeSheet(); }

document.getElementById('shSave').onclick=saveSheet;
document.getElementById('shRemove').onclick=removeSheet;
document.getElementById('shCancel').onclick=closeSheet;
sheetBg.onclick=e=>{ if(e.target===sheetBg) closeSheet(); };
priceInput.addEventListener('keydown',e=>{ if(e.key==='Enter') saveSheet(); });

const zoomBg=document.getElementById('zoomBg');
zoomBg.onclick=()=>zoomBg.classList.remove('open');

document.getElementById('viewToggle').onclick=()=>{ gridView=!gridView; persistView(); render(); };
document.getElementById('search').addEventListener('input',e=>{ query=e.target.value; render(); });

document.getElementById('exportBtn').onclick=()=>{
  const rows=[['Set','Number','Card','Purchased','Price']];
  CARDS.forEach(c=>{ const g=state[c[4]]; rows.push([c[0],c[1],c[2],g?'Yes':'No',g?(+g.price||0):'']); });
  const csv=rows.map(r=>r.map(f=>{ const s=String(f);
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); const d=new Date().toISOString().slice(0,10);
  a.href=url; a.download='vmax-haul-'+d+'.csv'; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
};
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('Clear all purchases and prices? This cannot be undone.')){ state={}; persist(); render(); }
};

load();
</script>
